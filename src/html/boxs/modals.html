<div class="modal" id="viewer-video">
  <div class="modal__body">
    <button class="viewer__close btn-reset js-close-modal">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <use xlink:href="img/sprite.svg#viewerClose"></use>
      </svg>
    </button>
    <div class="viewer-video__window js-box-video-iframe">
      <iframe src="" width="100%" height="100%" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>
</div>

<div class="modal" id="modal-search">
  <div class="modal__body">
    <button class="viewer__close btn-reset js-close-modal">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <use xlink:href="img/sprite.svg#viewerClose"></use>
      </svg>
    </button>
    <div class="modal-search__window">
      <form>
        <div class="modal-search__line">
          <label class="input-type-search">
            <input class="input-type-search__input" type="text">
          </label>
          <button class="submit-type-search btn-reset">
            <span class="text">
              Найти
            </span>
            <span class="svg">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <use xlink:href="img/sprite.svg#btnSearch"></use>
              </svg>
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal" id="resp-vac">
  <div class="modal__body">
    <button class="modal__close btn-reset js-close-modal">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <use xlink:href="img/sprite.svg#viewerClose"></use>
      </svg>
    </button>
    <div class="resp-vac__window">
      <form class="js-form">
        <div class="form-type-1">
          <h4 class="form-type-1__title">Отклик на вакансию</h4>
          <div class="form-type-1__group-input">
            <label class="input-type-1">
              <input class="input-type-1__input required" type="text" placeholder="Ваше имя">
              <span class="message-error">Это поле не может быть пустым</span>
            </label>
            <label class="input-type-1">
              <input class="input-type-1__input required js-phone-mask required-phone" type="text" placeholder="Ваш телефон">
              <span class="message-error">Это поле не может быть пустым</span>
            </label>
            <label class="textarea-type-1">
              <textarea class="textarea-type-1__text" placeholder="Комментарий"></textarea>
              <span class="message-error">Это поле не может быть пустым</span>
            </label>
          </div>
          <div class="input-file">
            <label class="input-file__label">
              <input class="input-file__input js-file" type="file" multiple>
              <span class="text">Загрузить резюме</span>
              <span class="svg">
                <svg width="23" height="23" viewBox="0 0 23 23" fill="none">
                  <use xlink:href="img/sprite.svg#inputFile"></use>
                </svg>
              </span>
            </label>
            <span class="input-file__wrapp">
              <span class="input-file__info">Допустимые форматы:&nbsp;doc, docx, pdf</span>
              <span class="input-file__info">Допустимый размер: не более&nbsp;5 MB</span>
            </span>
          </div>
          <div class="form-type-1__group-btn">
            <button class="form-type-1__submit btn-reset" type="submit">
              <span class="text">Отправить резюме</span>
            </button>

            <label class="checkbox-type-1">
              <input class="checkbox-type-1__input required required-checkbox" checked type="checkbox">
              <span class="castom">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="9" viewBox="0 0 11 9" fill="none">
                  <path d="M9.69922 0.700012L3.39922 8.20001L0.699219 5.20001" stroke="#00CB62" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="checkbox-type-1__desc">
                Нажимая отправить вы даёте согласие с <a href="#">политикой обработки персональных данных</a>
              </span>
            </label>
          </div>
        </div>
      </form>
    </div>
    <div class="success-message__window none">
      <div class="success-message__wrapper">
        <h4 class="success-message__title">Ваше сообщение отправлено</h4>
        <p class="success-message__desc">Спасибо за ваш отклик, мы скоро с вами свяжемся!</p>
      </div>
    </div>
  </div>
</div>
